name: ArbiterIOS
options:
  bundleIdPrefix: site.funclass
  deploymentTarget:
    iOS: "17.0"
configs:
  Debug: debug
  Release: release
targets:
  ArbiterIOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources/ArbiterIOS
    info:
      path: Sources/ArbiterIOS/Info.plist
      properties:
        UILaunchScreen: {}
        UIBackgroundModes:
          - audio
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: site.funclass.arbiter.ios
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
